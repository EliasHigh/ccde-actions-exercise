name: GitHub Actions Exercise 11

on:
  push:
    branches: [ "main" ]          # Trigger 1: nach jedem Push auf main
  schedule:
    - cron: '0 0 * * 1'           # Trigger 2: Zeitgesteuert – jeden Montag um 00:00 UTC
  workflow_dispatch:              # Trigger 3: Manuell über die GitHub-Website

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies and Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax Check (Compile)
        run: python -m compileall .

      - name: Automated Tests
        run: python -m unittest discover -s tests -v

      - name: Linting (Ruff)
        run: ruff check .

      - name: Security Check (Bandit)
        run: bandit -r app
        continue-on-error: true   # Pipeline läuft weiter, auch wenn Sicherheitsprobleme gefunden werden

      - name: Vulnerability Audit (pip-audit)
        run: pip-audit -r requirements.txt -f json -o audit.json
        continue-on-error: true   # Report wird trotzdem als Artifact hochgeladen

      - name: Upload Audit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit.json

      # EXTRA: Marketplace Action – Markdown Linting
      - name: Marketplace Action - Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
        continue-on-error: true   # Zeigt Markdown-Probleme, ohne die Pipeline zu stoppen
